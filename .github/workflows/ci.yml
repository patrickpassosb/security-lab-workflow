name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # T2-23: for upload-sarif to code scanning

# T2-23: cancel old runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Find bash scripts in bin/
        id: find
        run: |
          set -e
          scripts=""
          for f in bin/*; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              *.bak.*) continue ;;
            esac
            head -n1 "$f" 2>/dev/null | grep -Eq '^#!.*(bash|/sh)' || continue
            scripts="$scripts:$f"
          done
          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        # -S warning: surface genuine warnings (unused vars, unsafe find,
        # etc.) but don't fail CI on info/style notes (SC2015 A&&B||C idiom,
        # SC2012 ls, SC2016 single-quoted expansions). Many helper scripts
        # intentionally use `cmd && ok || warn` for concise status checks
        # where the `ok` branch cannot fail. See .shellcheckrc for the full
        # rationale.
        run: |
          set -e
          IFS=':' read -ra FILES <<< "${{ steps.find.outputs.scripts }}"
          FILES=("${FILES[@]:1}")
          shellcheck -S warning install.sh "${FILES[@]}"

  ruff:
    name: ruff (python lint, full repo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install -r requirements.txt
      - name: Ruff check (full repo)
        # SI-009: upgraded from `ruff check bin/ templates/` to `ruff check .`
        # to lint the whole tree (lib/, tests/, schemas/ if any .py, etc.).
        # install.sh and the extensionless bin/ scripts are bash — ruff's
        # extend-exclude in ruff.toml plus file-extension detection keeps them
        # out. ruff.toml is the single source of truth for rule selection and
        # per-file ignores (e.g. bin/* E402 for sys.path hacks).
        # CI modernization: ruff.toml now enables S (flake8-bandit) with
        # justified per-file/global suppressions — see ruff.toml for the
        # rationale on each suppression.
        run: ruff check .

  pytest:
    name: pytest (unit tests, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # CI modernization item 1: test on Python 3.11 AND 3.12. The repo
      # targets py311 (ruff.toml target-version) and uses py3.11 features
      # (PEP 604 `X | Y` unions). 3.12 must keep passing so future 3.12-only
      # features stay opt-in, not accidental.
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Bubblewrap (ADR-0003 isolation)
        # ADR-0003 requires network-namespace isolation (bwrap --unshare-net)
        # for the eval runner tests. Without bwrap, the isolation tests
        # silently skip and the ADR-0003 contract is untested in CI.
        # This step installs bubblewrap so the isolation tests actually
        # run instead of being skipped.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap
      - name: Enable unprivileged user namespaces (bwrap loopback setup)
        # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user
        # namespaces via AppArmor, which breaks bwrap --unshare-net
        # loopback setup ("RTM_NEWADDR: Operation not permitted").
        # The eval runner uses --unshare-user --unshare-net; the user
        # namespace needs CAP_NET_ADMIN to configure loopback in the
        # new net namespace. This sysctl disables the AppArmor
        # restriction so bwrap can create the user namespace.
        # If the sysctl doesn't exist (older Ubuntu), this is a no-op.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Verify bwrap is available
        # Fail the job if bwrap is not on PATH after install — the
        # isolation tests depend on it (ADR-0003 §3: no advisory-only
        # fallback). Also smoke-test --unshare-net to catch environment
        # issues early.
        run: |
          which bwrap || { echo "ERROR: bwrap not found — ADR-0003 isolation unavailable in CI"; exit 1; }
          bwrap --version
          bwrap --unshare-user --unshare-net --proc /proc --dev /dev \
            --ro-bind /usr /usr --ro-bind /bin /bin \
            --ro-bind /lib /lib --ro-bind /lib64 /lib64 \
            -- python3 -c "print('bwrap --unshare-net smoke test ok')" \
            || { echo "ERROR: bwrap --unshare-net failed — CI cannot run isolation tests"; exit 1; }
      - name: Install Python deps
        # requirements.txt now carries the CI/test deps too (CI modernization):
        # pytest, pytest-timeout, pytest-cov, junit-xml, jsonschema, mypy.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        # CI modernization:
        #   - --timeout=60 (item 2): per-test 60s wall clock, fail fast on hangs.
        #   - --junit-xml (item 8): always emit test-results.xml for artifact upload.
        #   - --cov (item 4): coverage BASELINE reporting — captured and printed,
        #     NOT enforced (no --fail-under). Lets us track the number over time.
        # PYTHONPATH=lib is critical so tests can import labutil, h1report,
        # and (Phase 1) finding_events directly from lib/ without packaging.
        env:
          PYTHONPATH: lib
        run: |
          pytest tests/ -v --tb=short \
            --timeout=60 \
            --junit-xml=test-results.xml \
            --cov=lib --cov=bin \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-branch
      - name: Coverage baseline (advisory)
        # Item 4: print a coverage baseline summary line. This is NOT a gate —
        # there is no --fail-under. It gives us a number to track across PRs
        # without blocking on it. Once we're happy with the baseline we can
        # add --cov-fail-under in a separate change.
        run: |
          python3 -c "import xml.etree.ElementTree as ET; \
          t=ET.parse('coverage.xml').getroot(); \
          print(f'coverage baseline: line={t.attrib.get(\"line-rate\",\"?\")} branch={t.attrib.get(\"branch-rate\",\"?\")} (advisory, not enforced)')"
      - name: Upload test results
        # Always upload JUnit XML + coverage, not just on failure (item 8).
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        if: always()
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml
          if-no-files-found: ignore
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: pytest-output-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            **/__pycache__/
          if-no-files-found: ignore

  schema-validate:
    name: schema validation (JSON schema)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install jsonschema
        # CI modernization item 6: upgrade from syntax-only json.load to real
        # JSON Schema validation via the jsonschema package. This catches
        # semantic errors (wrong types, missing required fields) that
        # json.load silently accepts. requirements.txt now includes jsonschema.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate JSON schemas
        # CI modernization item 6: upgrade from syntax-only json.load to real
        # JSON Schema validation via the jsonschema package. bin/validate-schemas
        # picks the validator for each schema's declared $schema draft and runs
        # meta-validation, catching semantic errors (wrong types, missing
        # required fields, malformed $ref) that json.load silently accepts.
        # The same script powers `make check` (Makefile CI parity).
        run: |
          python3 bin/validate-schemas

  typing:
    name: typing (mypy, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install deps
        # CI modernization item 7: add mypy as a NON-BLOCKING CI step. It
        # surfaces typing issues so we can tighten over time without breaking
        # PRs on day one. requirements.txt includes mypy.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run mypy (advisory)
        # Non-blocking: the `continue-on-error: true` on this step means mypy
        # findings are reported in the job log and the job still passes. This
        # is intentional — the repo is not fully typed yet, and we want the
        # step to exist and run, not to gate. pyproject.toml [tool.mypy]
        # configures the scope (lib/ + tests/) and strictness.
        continue-on-error: true
        env:
          PYTHONPATH: lib
        run: mypy lib/ tests/

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        # Full-repo scan (no commit-range). The gitleaks-action hard-codes a
        # BASE^..HEAD range for push events, which fails on the first commit
        # of a repo (BASE has no parent). Scanning the whole tree from source
        # is robust to first-push / shallow-clone / force-push edge cases.
        run: |
          set -e
          gitleaks detect --source . --redact --verbose \
            --report-format=sarif --report-path=results.sarif \
            --log-level=info
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: gitleaks-results.sarif
          path: results.sarif
          if-no-files-found: ignore
      - name: Upload SARIF to GitHub code scanning  # T2-23
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          sarif_file: results.sarif
