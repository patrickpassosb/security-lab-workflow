name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # T2-23: for upload-sarif to code scanning

# T2-23: cancel old runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Find bash scripts in bin/
        id: find
        run: |
          set -e
          scripts=""
          for f in bin/*; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              *.bak.*) continue ;;
            esac
            head -n1 "$f" 2>/dev/null | grep -Eq '^#!.*(bash|/sh)' || continue
            scripts="$scripts:$f"
          done
          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        # -S warning: surface genuine warnings (unused vars, unsafe find,
        # etc.) but don't fail CI on info/style notes (SC2015 A&&B||C idiom,
        # SC2012 ls, SC2016 single-quoted expansions). Many helper scripts
        # intentionally use `cmd && ok || warn` for concise status checks
        # where the `ok` branch cannot fail. See .shellcheckrc for the full
        # rationale.
        run: |
          set -e
          IFS=':' read -ra FILES <<< "${{ steps.find.outputs.scripts }}"
          FILES=("${FILES[@]:1}")
          shellcheck -S warning install.sh "${FILES[@]}"

  ruff:
    name: ruff (python lint, full repo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install -r requirements.txt
      - name: Ruff check (full repo)
        # SI-009: upgraded from `ruff check bin/ templates/` to `ruff check .`
        # to lint the whole tree (lib/, tests/, schemas/ if any .py, etc.).
        # install.sh and the extensionless bin/ scripts are bash — ruff's
        # extend-exclude in ruff.toml plus file-extension detection keeps them
        # out. ruff.toml is the single source of truth for rule selection and
        # per-file ignores (e.g. bin/* E402 for sys.path hacks).
        run: ruff check .

  pytest:
    name: pytest (unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install Python deps
        # requirements.txt pins ruff + pyyaml + requests. pytest is added
        # explicitly (not in requirements.txt — it's a CI/test-only dep).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        # PYTHONPATH=lib is critical so tests can import labutil, h1report,
        # and (Phase 1) finding_events directly from lib/ without packaging.
        env:
          PYTHONPATH: lib
        run: pytest tests/ -v --tb=short
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: pytest-output
          path: |
            .pytest_cache/
            **/__pycache__/
          if-no-files-found: ignore

  schema-validate:
    name: schema validation (JSON syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Validate JSON schemas
        # SI-009: schemas/ just got audit-event-v1; this step guards against
        # malformed JSON (trailing commas, unescaped quotes, etc.) that would
        # break runtime loaders. Syntax-only check; semantic validation is
        # done by the consumers (lib/labutil.py, etc.) at read time.
        # No-op when schemas/ has no .json files yet — glob returns [].
        run: |
          python3 -c "import json, glob; \
          files = glob.glob('schemas/*.json'); \
          [json.load(open(f)) for f in files]; \
          print(f'validated {len(files)} schema file(s)')"

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        # Full-repo scan (no commit-range). The gitleaks-action hard-codes a
        # BASE^..HEAD range for push events, which fails on the first commit
        # of a repo (BASE has no parent). Scanning the whole tree from source
        # is robust to first-push / shallow-clone / force-push edge cases.
        run: |
          set -e
          gitleaks detect --source . --redact --verbose \
            --report-format=sarif --report-path=results.sarif \
            --log-level=info
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: gitleaks-results.sarif
          path: results.sarif
          if-no-files-found: ignore
      - name: Upload SARIF to GitHub code scanning  # T2-23
        if: always()
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88  # v3.27.5
        with:
          sarif_file: results.sarif
