name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Find bash scripts in bin/
        id: find
        run: |
          set -e
          scripts=""
          for f in bin/*; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              *.bak.*) continue ;;
              __pycache__) continue ;;
            esac
            head -n1 "$f" 2>/dev/null | grep -Eq '^#!.*(bash|/sh)' || continue
            scripts="$scripts:$f"
          done
          echo "scripts=$scripts" >> "$GITHUB_OUTPUT"
      - name: Run shellcheck
        run: |
          set -e
          IFS=':' read -ra FILES <<< "${{ steps.find.outputs.scripts }}"
          FILES=("${FILES[@]:1}")
          shellcheck install.sh "${FILES[@]}"

  ruff:
    name: ruff (python scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check bin/ templates/ install.sh

  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}