# Known Informative precedent registry — SYNTHETIC EXAMPLE (tracked, public)
#
# This is a synthetic reference file showing the format of the real
# per-engagement `precedents.yaml` files (gitignored, private). It contains
# NO real program names, behaviors, or report IDs.
#
# Real precedent files live at:
#   <engagement>/.lab/precedents.yaml
# e.g. <engagement>/.lab/precedents.yaml (gitignored via .gitignore:10)
#
# Per SI-014 (handoff section 6.3) + roadmap section 12.4:
# - This example file = tracked, public, synthetic placeholders.
# - The real per-engagement file = gitignored, private, real report IDs.
#
# The `assess` command (SI-015, `lab-h1-report assess`) loads the
# engagement's precedents.yaml via finding_events.load_precedents() and
# applies SI-031 cross-program promotion (audit section 10.3):
#
#   - A precedent with `state=informative|duplicate` is a hard BLOCK only
#     when `confirmed_by_programs` lists 2+ independent programs. This
#     prevents overfitting to one program's triager preferences (audit
#     section 10.2): one program triaging metadata leaks as Informative
#     should not block metadata leaks for ALL programs.
#   - A single-program precedent (confirmed_by_programs absent or < 2
#     entries) is ADVISORY: assess returns a HOLD with a provenance label
#     (which program triaged it, how many programs confirmed) so the
#     agent knows it is not cross-validated. The agent confirms the
#     program's stance before submitting.
#   - `candidate_informative` is always a soft HOLD (the program has not
#     definitively closed it yet).
#
# Entry fields:
#   program:    the program name (must match the engagement's program)
#   behavior:   human-readable description of the behavior (matched by
#               substring against the finding's title/workspace name)
#   report_id:  real H1 report ID (string) or null when no report was filed
#   state:      informative | candidate_informative | duplicate | resolved
#   date:       ISO 8601 date the outcome was observed
#   note:       free-text context (why it was Informative, what the program
#               said, etc.)
#   confirmed_by_programs: (SI-031) list of program names that
#               independently confirmed this behavior as the same state.
#               Omit or leave empty for a single-program precedent
#               (advisory). BLOCK only when len >= 2. Provenance is
#               preserved so the agent can audit which programs
#               contributed to the promotion.

precedents:
  # Example: a behavior previously assessed as Informative by a program.
  # This is a SINGLE-PROGRAM precedent (no confirmed_by_programs) —
  # advisory HOLD, not a hard BLOCK (audit section 10.3).
  - program: <PROGRAM>
    behavior: "<PROGRAM_ENDPOINT> unauthenticated metadata leak"
    report_id: <H1_REPORT_ID>
    state: informative
    date: "YYYY-MM-DD"
    note: "Program assessed metadata as acceptable after removing sensitive fields"

  # Example: a behavior suspected to be Informative but not yet confirmed.
  # The assess command treats candidate_informative as a soft signal —
  # it surfaces a HOLD rather than a hard BLOCK when the behavior matches,
  # because the program has not definitively closed it yet.
  - program: <PROGRAM>
    behavior: "Client-side telemetry token in error reporting"
    report_id: null
    state: candidate_informative
    date: "YYYY-MM-DD"
    note: "Likely treated as public client telemetry (like Sentry DSN)"

  # Example: a behavior previously closed as a Duplicate.
  - program: <PROGRAM>
    behavior: "<PROGRAM_ENDPOINT> cross-workspace IDOR"
    report_id: <H1_REPORT_ID>
    state: duplicate
    date: "YYYY-MM-DD"
    note: "Duplicate of an earlier report; original was closed Informative"

  # Example (SI-031): a CROSS-PROGRAM confirmed precedent. Two
  # independent programs (notion, atlassian) both triaged this behavior
  # as Informative. assess hard-BLOCKs this for ALL engagements because
  # the behavior is cross-validated. The confirmed_by_programs list
  # preserves provenance so the agent can audit which programs
  # contributed.
  - program: <PROGRAM>
    behavior: "unauthenticated metadata leak with sensitive fields removed"
    report_id: <H1_REPORT_ID>
    state: informative
    date: "YYYY-MM-DD"
    note: "Cross-program confirmed: both programs triage this as Informative"
    confirmed_by_programs:
      - <PROGRAM_A>
      - <PROGRAM_B>

# The `assess` command checks this registry before recommending submission.
# If the finding's behavior (derived from report_h1.md title or workspace
# name) matches an entry with state=informative AND confirmed_by_programs
# has 2+ entries, assess returns BLOCK ("Known informative behavior
# (cross-confirmed by N programs)"). A single-program match returns HOLD
# (advisory; the agent confirms the program's stance before submitting).