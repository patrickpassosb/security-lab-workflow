# Known outcomes — SYNTHETIC EXAMPLE (tracked, public)
#
# This is a synthetic reference file showing the format of the real
# `improvement/private/known_outcomes.yaml` (gitignored). It contains NO
# real program names, behaviors, or report IDs.
#
# Copy to `improvement/private/known_outcomes.yaml` and replace placeholders
# with real data. The real file is gitignored (see .gitignore: improvement/private/).
#
# Per ADR-0001 (docs/adr/0001-tcb-runtime-split.md):
# - improvement/config/known_outcomes.example.yaml = THIS FILE (tracked, public)
# - improvement/private/known_outcomes.yaml = real file (gitignored, private)

known_outcomes:
  # Example: a behavior previously assessed as Informative by a program.
  - program: <PROGRAM>
    behavior: "<PROGRAM_ENDPOINT> unauthenticated metadata leak"
    report_id: <H1_REPORT_ID>
    state: informative
    date: "YYYY-MM-DD"
    note: "Program assessed metadata as acceptable after removing sensitive fields"

  # Example: a behavior suspected to be Informative but not yet confirmed.
  - program: <PROGRAM>
    behavior: "Client-side telemetry token in error reporting"
    report_id: null
    state: candidate_informative
    date: "YYYY-MM-DD"
    note: "Likely treated as public client telemetry (like Sentry DSN)"

# The `assess` command checks this database before recommending submission.
# If the behavior matches an entry with state=informative, `assess` recommends
# do_not_report regardless of technical verdict.