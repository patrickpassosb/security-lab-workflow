# Engagement scope — EXAMPLE bounty (synthetic, committable)
# Type: bounty
#
# This is a synthetic reference file showing the engagement-scope format.
# It contains NO real target scope. Copy to engagements/bounty-<program>.yaml
# and replace example.com placeholders with the real program's scope before
# use. Real engagement files are gitignored (see .gitignore: engagements/bounty-*.yaml).
# Scope details can be pulled from HackerOne via: lab-h1-scope <handle> (planned — see ROADMAP.md).

engagement:
  name: "Example Bounty Program"
  type: bounty
  platform: hackerone
  program_url: "https://hackerone.com/example-program"
  safe_harbor: true
  authorized_by: "Example Corp (via HackerOne program)"
  about: "Example Corp is a synthetic example company used to illustrate the engagement-scope format."

# In-scope assets from the program's structured scope.
# Replace example.com / api.example.com with the real program's hosts.
in_scope:
  - pattern: "www.example.com"
    note: "Frontend / marketing site"
  - pattern: "api.example.com"
    note: "Public API — privesc beyond token scope"
  - pattern: "identity.example.com"
    note: "Auth service (OAuth2, login, session)"

# Engagement-specific denials (merged with global scope.yaml denied list).
denied: []

# Structured HackerOne assets. `asset_id` in a report_h1.md must match one
# `assets[].id` exactly, and `asset_name` must match the asset's `display_name`
# exactly. `asset_type` is platform metadata, not a hostname validation rule;
# existing `in_scope` and `denied` lists continue to govern live targets.
assets:
  - id: frontend
    display_name: Frontend / marketing site
    asset_type: URL
    patterns:
      - www.example.com
    finding_types:
      - live_web
    eligible_for_submission: true
    eligible_for_bounty: true

  - id: api
    display_name: Public API
    asset_type: API
    patterns:
      - api.example.com
    finding_types:
      - live_web
    eligible_for_submission: true
    eligible_for_bounty: true

  - id: example-github-public-artifacts
    display_name: Example GitHub Repositories or other public artifacts
    asset_type: OTHER
    patterns:
      - github.com/example-org/*
    finding_types:
      - source_code
    eligible_for_submission: true
    eligible_for_bounty: true

# Rate limits — bounty = slow, careful, production.
rate_limits:
  nuclei_rps: 5
  ffuf_rate: "100-300ms jitter"
  httpx_threads: 10
  nmap_timing: "T2"
  global_max_parallel: 2

# Techniques allowed without approval.
techniques_allowed:
  - passive_recon
  - active_recon
  - web_app_testing
  - api_testing
  - idor
  - ssrf
  - ssti
  - xss
  - jwt_attacks
  - auth_bypass
  - parameter_pollution

# Techniques requiring explicit human approval before use.
techniques_require_approval:
  - sqli
  - file_upload
  - deserialization
  - race_conditions
  - directory_fuzzing
  - subdomain_enum
  - nuclei_template_scans
  - social_engineering

# Techniques NEVER allowed on this engagement.
techniques_denied:
  - dos_ddos
  - ddos_amplification
  - brute_force_without_oracle

# Bounty amounts per asset (replace with your program's actual rewards).
bounty_table:
  - asset: "Product API"
    low: 100
    medium: 250
    high: 2000
    critical: 5000
  - asset: "Public API"
    low: 100
    medium: 250
    high: 2000
    critical: 5000
  - asset: "Authentication"
    low: 100
    medium: 250
    high: 2000
    critical: 5000

# Common out-of-scope findings (adapt to your program).
out_of_scope_findings:
  - "Use of automated scanning tools (nuclei, ffuf, feroxbuster, sqlmap, etc.)"
  - "Lack of rate limiting on non-authentication endpoints"
  - "Self-XSS issues"
  - "Clickjacking without account takeover or sensitive disclosure"
  - "CSRF on unauthenticated or non-sensitive forms"
  - "Open redirect without additional security impact"
  - "Content spoofing / text injection without modifying HTML/CSS"
  - "Missing security headers (CSP, HttpOnly, Secure flags)"
  - "Banner / version disclosure"
  - "CSV injection without demonstrating vulnerability"
  - "Missing best practices in SSL/TLS configuration"
  - "DoS / stress tests"
  - "Testing on accounts not owned by you"
  - "Social engineering / phishing"

# Program rules (adapt to your program).
program_rules:
  - "One vulnerability per report (unless chaining for impact)"
  - "First report wins on duplicates"
  - "Multiple vulns from one underlying issue = one bounty"
  - "Reports covering multiple assets = paid once at highest category"
  - "Create accounts specifically for testing — no testing on accounts you don't own"
  - "No social engineering"
  - "No DoS"
  - "No automated scanning tools (if prohibited by the program)"

# Response targets.
response_targets:
  first_response: "3 business days"
  triage: "10 business days"
  resolution: "varies by severity"

# Evidence collection.
evidence:
  audit_log: "~/security-lab/findings/.agent-audit.jsonl"
  findings_dir: "~/security-lab/bounties/example/findings/"

# Reporting.
reporting:
  submit_via: "HackerOne report"
  format: "impact-first: summary -> impact -> steps to reproduce -> remediation"
  rules:
    - "No data exfiltration beyond what proves the bug."
    - "No destructive actions."
    - "No automated exploitation beyond PoC."
    - "Read the program's full policy page for rules of engagement, safe harbor, and exclusions."

# Program's stated interests (from H1 structured scope).
interests:
  - "Product API: injection attacks, RCE, SSRF, IDOR, privilege escalation"
  - "Public API: ability to escalate privileges beyond the scope of API tokens"
  - "Privilege Escalation: access pages a user should not access"