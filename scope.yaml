# Global scope — applies to ALL engagements
# Per-engagement scopes live in ~/security-lab/engagements/<name>.yaml
# This file is read by: scope skill, ctf-workflow skill, lab-scope, lab-new
#
# Logic (default-deny):
#   1. If target matches any pattern in `denied` → REJECT (always, all engagements)
#   2. If target matches any pattern in the engagement's `in_scope` → ALLOW
#   3. If target matches any pattern in the engagement's `denied` → REJECT
#   4. Otherwise → ASK HUMAN (default-deny)

# Universal denied list — never in scope regardless of engagement.
# These apply to ALL engagements and CANNOT be overridden by engagement scopes.
denied:
  - pattern: "*.gov"
    reason: "Government hosts — never in scope"
  - pattern: "*.mil"
    reason: "Military hosts — never in scope"
  - pattern: "*.edu"
    reason: "Educational institutions — never in scope"

# Default rate limits — used when an engagement doesn't override them.
default_rate_limits:
  nuclei_rps: 10
  ffuf_rate: "10-50ms jitter"
  httpx_threads: 50
  nmap_timing: "T3"
  global_max_parallel: 4

# Default techniques allowed (engagement scopes can expand or restrict this).
default_techniques_allowed:
  - passive_recon
  - active_recon
  - web_app_testing
  - api_testing

# Evidence collection (shared across all engagements).
evidence:
  audit_log: "~/security-lab/findings/.agent-audit.jsonl"

# Notes for agents
notes:
  - "This file contains ONLY global rules. Engagement-specific scope, rate limits, and techniques live in engagements/<name>.yaml."
  - "To start a new engagement: create engagements/<name>.yaml, then run lab-new."
  - "To check scope: lab-scope <target> --engagement <name>."
  - "To list engagements: lab-scope --list."